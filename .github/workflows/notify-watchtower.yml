name: Notify Watchtower

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]
    branches: [main]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: LMCustoms/.github/.github/workflows/notify-watchtower.yml@main
    secrets:
      DEPLOY_HOST: ${{ secrets.HOST }}
      DEPLOY_USER: ${{ secrets.USER }}
      DEPLOY_SSH_KEY: ${{ secrets.SSH_KEY }}
      WATCHTOWER_HTTP_API_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
